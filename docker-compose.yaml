services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dbadmin
      MYSQL_DATABASE: productos
    volumes:
      - ./productos.sql:/docker-entrypoint-initdb.d/01-productos.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdbadmin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
